<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>音読検定</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    audio { height: 40px; }
    audio::-webkit-media-controls-panel { background-color: #f3f4f6; }
    .shine-effect::after {
      content: '';
      position: absolute;
      top: 0; left: -100%; width: 50%; height: 100%;
      background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.8) 50%, rgba(255,255,255,0) 100%);
      transform: skewX(-20deg);
      animation: shine 2s infinite;
    }
    @keyframes shine { 100% { left: 200%; } }
  </style>
</head>
<body class="bg-gray-100 font-sans">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================================
    // ★★★ 設定エリア ★★★
    // ========================================================

    // ① 先生方の「新しいGASのURL」を設定してください
    const TEACHERS = [
      { id: 'nakamura', name: '中村先生', url: "https://script.google.com/macros/s/AKfycby83b1Vsq3aMXqkRAWAPtlUTCgf95F2bxWax5U7jaPF0q8cvimqYJqK0ihnSrhDmUO-6Q/exec" },
      { id: 'kobari', name: '小針先生', url: "小針先生のGAS_URLをここに貼り付け" },
      { id: 'mochizuki', name: '望月先生', url: "https://script.google.com/macros/s/AKfycbw0duZJNEtqvJ9FfbgPNybdD1e7EPFYduwdTs7J7lFCWHPvw0axx2tOkqlhniQuDsO5Dg/exec" },
      { id: 'uomi', name: '魚躬先生', url: "魚躬先生のGAS_URLをここに貼り付け" },
      { id: 'kaida', name: '貝田先生', url: "貝田先生のGAS_URLをここに貼り付け" }
    ];

    // ② 各パートの制限時間（秒）
    const TIME_LIMITS = {
      "1-1": 50, "1-2": 50, "1-3": 55,
      "2-1": 55, "2-2": 45, "2-3": 45,
      "3-1": 55, "3-2": 75, "3-3": 65,
      "4-1": 65, "4-2": 70, "4-3": 65,
      "5-1": 45, "5-2": 65, "5-3": 85,
      "6-1": 80, "6-2": 70, "6-3": 55,
      "7-1": 80, "7-2": 70, "7-3": 85,
      "8-1": 100, "8-2": 75, "8-3": 75,
      "9-1": 70, "9-2": 70, "9-3": 90,
      "10-1": 80, "10-2": 85, "10-3": 95
    };

    // ========================================================

    const { useState, useRef, useEffect } = React;

    const IconMic = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="22"></line></svg>;
    const IconCheck = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
    const IconSend = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>;
    const IconLock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
    const IconClock = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>;
    const IconSparkles = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
    const IconLoader = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
    const IconVolume = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;

    function App() {
      const [mode, setMode] = useState('select'); 
      const [step, setStep] = useState('userInfo'); 
      
      const [userInfo, setUserInfo] = useState(() => {
        const saved = localStorage.getItem('englishAppUserInfo');
        if (saved) return JSON.parse(saved);
        return { classNum: '', studentNum: '', name: '', lesson: '1', teacherId: '' };
      });
      
      const [checkInfo, setCheckInfo] = useState(() => {
        const saved = localStorage.getItem('englishAppUserInfo');
        if (saved) {
          const parsed = JSON.parse(saved);
          return { classNum: parsed.classNum || '', studentNum: parsed.studentNum || '', password: '', teacherId: parsed.teacherId || '' };
        }
        return { classNum: '', studentNum: '', password: '', teacherId: '' };
      });

      useEffect(() => {
        const urlParams = new URLSearchParams(window.location.search);
        const tId = urlParams.get('teacher');
        const cNum = urlParams.get('class');
        const sNum = urlParams.get('student');
        const pass = urlParams.get('pass');

        if (tId && cNum && sNum && pass) {
          const info = { teacherId: tId, classNum: cNum, studentNum: sNum, password: pass };
          setCheckInfo(info);
          setMode('checkFlow');
          checkResultFromGas(info); 
        }
      }, []);

      useEffect(() => {
        if (userInfo.classNum || userInfo.studentNum || userInfo.name || userInfo.lesson || userInfo.teacherId) {
          localStorage.setItem('englishAppUserInfo', JSON.stringify(userInfo));
        }
      }, [userInfo]);

      useEffect(() => {
        if (checkInfo.classNum || checkInfo.studentNum) {
          setUserInfo(prev => ({...prev, classNum: checkInfo.classNum, studentNum: checkInfo.studentNum}));
        }
      }, [checkInfo.classNum, checkInfo.studentNum]);

      const [selectedImagePath, setSelectedImagePath] = useState(null);
      const [selectedImageBase64, setSelectedImageBase64] = useState("");
      const [selectedPart, setSelectedPart] = useState(1);
      const [isRouletteFinal, setIsRouletteFinal] = useState(false);
      
      const [isRecording, setIsRecording] = useState(false);
      const [transcript, setTranscript] = useState("");
      const [micReady, setMicReady] = useState(false);
      const [micLevel, setMicLevel] = useState(0);
      const [password, setPassword] = useState('');
      const [checkStatus, setCheckStatus] = useState(''); 
      const [checkResult, setCheckResult] = useState(null);
      const [timeLimit, setTimeLimit] = useState(30);
      const [timeRemaining, setTimeRemaining] = useState(30);

      // ★追加：録音した音声を保持・プレビューするためのState
      const [audioBlob, setAudioBlob] = useState(null);
      const [audioUrl, setAudioUrl] = useState(null);

      const mediaRecorderRef = useRef(null);
      const audioChunksRef = useRef([]);
      const recognitionRef = useRef(null);
      const audioContextRef = useRef(null);
      const analyserRef = useRef(null);
      const animationFrameRef = useRef(null);
      const streamRef = useRef(null);

      useEffect(() => {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
          recognitionRef.current = new SpeechRecognition();
          recognitionRef.current.continuous = true;
          recognitionRef.current.interimResults = true;
          recognitionRef.current.lang = 'en-US';
          recognitionRef.current.onresult = (event) => {
            let currentTranscript = '';
            for (let i = 0; i < event.results.length; i++) currentTranscript += event.results[i][0].transcript + ' ';
            setTranscript(currentTranscript);
          };
        }
      }, []);

      useEffect(() => {
        let timerId;
        if (isRecording && timeRemaining > 0) {
          timerId = setInterval(() => {
            setTimeRemaining((prev) => {
              if (prev <= 1) {
                clearInterval(timerId);
                stopRecording(); 
                return 0;
              }
              return prev - 1;
            });
          }, 1000);
        }
        return () => clearInterval(timerId);
      }, [isRecording, timeRemaining]);

      const startVisualizer = (stream) => {
        if (!audioContextRef.current) audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
        analyserRef.current = audioContextRef.current.createAnalyser();
        const source = audioContextRef.current.createMediaStreamSource(stream);
        source.connect(analyserRef.current);
        const dataArray = new Uint8Array(analyserRef.current.frequencyBinCount);
        const updateMicLevel = () => {
          analyserRef.current.getByteFrequencyData(dataArray);
          let sum = 0;
          for (let i = 0; i < dataArray.length; i++) sum += dataArray[i];
          setMicLevel((sum / dataArray.length));
          animationFrameRef.current = requestAnimationFrame(updateMicLevel);
        };
        updateMicLevel();
      };

      const requestMicPermission = async () => {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          streamRef.current = stream;
          setMicReady(true);
          startVisualizer(stream);
        } catch (e) {
          alert("マイクへのアクセスが拒否されました。ブラウザの設定からマイクを許可してください！");
        }
      };

      const startShuffle = () => {
        setStep('shuffling');
        setIsRouletteFinal(false);
        const parts = [1, 2, 3]; 
        
        let currentTick = 0;
        const totalTicks = 25; 
        const finalP = parts[Math.floor(Math.random() * parts.length)]; 
        
        const tick = () => {
          currentTick++;
          if (currentTick < totalTicks) {
            setSelectedPart(parts[currentTick % 3]);
            const delay = Math.pow(currentTick, 1.4) * 4 + 30; 
            setTimeout(tick, delay);
          } else {
            setSelectedPart(finalP);
            setIsRouletteFinal(true);
            const finalPath = `./L${userInfo.lesson}-${finalP}.jpg`;
            setSelectedImagePath(finalPath);
            
            setTimeout(() => {
              prepareImage(finalPath, finalP);
            }, 1500);
          }
        };
        tick(); 
      };

      const prepareImage = async (imgPath, finalP) => {
        setStep('preparing');
        try {
          const res = await fetch(imgPath);
          if (!res.ok) throw new Error("Image Not Found");
          
          const blob = await res.blob();
          const reader = new FileReader();
          reader.onloadend = () => {
            setSelectedImageBase64(reader.result);
            
            const lessonPartKey = `${userInfo.lesson}-${finalP}`;
            const limit = TIME_LIMITS[lessonPartKey] || 30; 
            
            setTimeLimit(limit); 
            setTimeRemaining(limit);
            setStep('recording');
          };
          reader.readAsDataURL(blob);
        } catch (e) {
          alert(`画像ファイルが見つかりません: ${imgPath}\nNetlifyの同じフォルダ内に L${userInfo.lesson}-1.jpg 〜 L${userInfo.lesson}-3.jpg が入っているか確認してください。`);
          setStep('userInfo');
        }
      };

      const startRecording = async () => {
        setTranscript("");
        setTimeRemaining(timeLimit); 
        setAudioBlob(null);
        setAudioUrl(null);
        try {
          const stream = streamRef.current || await navigator.mediaDevices.getUserMedia({ audio: true });
          if (!streamRef.current) {
             streamRef.current = stream;
             startVisualizer(stream);
          }
          mediaRecorderRef.current = new MediaRecorder(stream);
          audioChunksRef.current = [];
          mediaRecorderRef.current.ondataavailable = (e) => { if (e.data.size > 0) audioChunksRef.current.push(e.data); };
          
          mediaRecorderRef.current.onstop = async () => {
            if (animationFrameRef.current) cancelAnimationFrame(animationFrameRef.current);
            const blob = new Blob(audioChunksRef.current, { type: mediaRecorderRef.current.mimeType || 'audio/webm' });
            
            // 録音完了後、画面遷移せずにURLをセットしてUIを切り替える
            setAudioBlob(blob);
            setAudioUrl(URL.createObjectURL(blob));

            stream.getTracks().forEach(track => track.stop());
            streamRef.current = null;
          };
          
          mediaRecorderRef.current.start();
          if (recognitionRef.current) { try { recognitionRef.current.start(); } catch(e) {} }
          setIsRecording(true);
        } catch (e) {
          alert("マイクエラーが発生しました。ページをリロードしてください。");
        }
      };

      const stopRecording = () => {
        if (mediaRecorderRef.current && isRecording) {
          mediaRecorderRef.current.stop();
          if (recognitionRef.current) { try { recognitionRef.current.stop(); } catch(e) {} }
          setIsRecording(false);
        }
      };

      const submitDataToGas = async (audioBlob) => {
        setStep('submitting');
        const targetTeacher = TEACHERS.find(t => t.id === userInfo.teacherId);
        if (!targetTeacher || !targetTeacher.url || targetTeacher.url.includes("ここに")) {
          alert("先生のGASのURLが正しく設定されていません。");
          setStep('recording');
          return;
        }

        const audioBase64 = await new Promise((res) => {
          const reader = new FileReader(); reader.onloadend = () => res(reader.result.split(',')[1]); reader.readAsDataURL(audioBlob);
        });
        
        const payload = {
          lessonPart: `L${userInfo.lesson}-${selectedPart}`,
          classNum: userInfo.classNum, 
          studentNum: userInfo.studentNum, 
          name: userInfo.name, 
          imgBase64: selectedImageBase64.split(',')[1], 
          audioBase64: audioBase64, 
          audioMimeType: audioBlob.type || "audio/webm", 
          transcript: transcript,
          appUrl: window.location.href.split('?')[0],
          teacherId: userInfo.teacherId
        };

        try {
          const res = await fetch(targetTeacher.url, {
            method: 'POST', headers: { 'Content-Type': 'text/plain' }, 
            body: JSON.stringify({ action: "saveSubmission", payload: payload })
          });

          let response;
          try {
            response = await res.json();
          } catch(jsonErr) {
            throw new Error("GASのURLが間違っているか、アクセス権限が「全員」になっていません。");
          }

          if (response.success) {
            setPassword(response.password); setStep('submitted');
          } else {
            alert("システム側でエラーが発生しました: " + response.error); setStep('recording');
          }
        } catch (err) {
          alert("通信エラーです。\n\n詳細: " + err.message + "\n\n先生のGASの「デプロイ設定」をもう一度確認してください。"); 
          setStep('recording');
        }
      };

      const checkResultFromGas = async (overrideInfo = null) => {
        const info = overrideInfo || checkInfo;
        if (!info.classNum || !info.studentNum || !info.password || !info.teacherId) return alert("すべて入力してください");
        
        const targetTeacher = TEACHERS.find(t => t.id === info.teacherId);
        if (!targetTeacher || !targetTeacher.url || targetTeacher.url.includes("ここに")) {
          alert("先生のGASのURLが正しく設定されていません。"); return;
        }

        setCheckStatus('checking');

        try {
          const res = await fetch(targetTeacher.url, {
            method: 'POST', headers: { 'Content-Type': 'text/plain' },
            body: JSON.stringify({ action: "getResult", classNum: info.classNum, studentNum: info.studentNum, password: info.password })
          });
          
          let response;
          try {
            response = await res.json();
          } catch(e) {
            throw new Error("GASのURLまたは権限設定に問題があります。");
          }

          if (response.status === 'ready') {
            setCheckResult(response.data); 
            if(overrideInfo) setCheckInfo(overrideInfo); 
            setCheckStatus('result');
          } else if (response.status === 'pending') {
            setCheckStatus('pending');
          } else {
            setCheckStatus('error');
          }
        } catch (err) {
          if (!overrideInfo) alert("通信エラーです。\n\n詳細: " + err.message);
          setCheckStatus('error');
        }
      };

      const speakWord = (word) => {
        if (!window.speechSynthesis) {
          alert("お使いのブラウザは音声再生に対応していません。");
          return;
        }
        const cleanWord = word.replace(/[^a-zA-Z0-9'-]/g, '');
        if (!cleanWord) return;

        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(cleanWord);
        utterance.lang = 'en-US'; 
        utterance.rate = 0.9; 
        window.speechSynthesis.speak(utterance);
      };

      const renderHighlightedText = (htmlStr) => {
        if (!htmlStr) return <span className="text-gray-400 text-sm">テキストデータがありません</span>;
        
        const parts = htmlStr.split(/(<excellent>.*?<\/excellent>|<bad>.*?<\/bad>|<skipped>.*?<\/skipped>)/g);
        
        return (
          <div className="text-sm sm:text-sm leading-relaxed text-gray-800 break-words">
            {parts.map((part, index) => {
              if (!part) return null;
              if (part.startsWith('<excellent>')) {
                const text = part.replace(/<\/?excellent>/g, '');
                return (
                  <span 
                    key={index} 
                    onClick={() => speakWord(text)}
                    title="クリックして発音を聞く"
                    className="bg-blue-600 text-white font-bold px-1 rounded mx-[1px] text-xs shadow-sm cursor-pointer hover:bg-blue-700 hover:scale-110 inline-block transition-all"
                  >{text}</span>
                );
              } else if (part.startsWith('<bad>')) {
                const text = part.replace(/<\/?bad>/g, '');
                return (
                  <span 
                    key={index} 
                    onClick={() => speakWord(text)}
                    title="クリックして発音を聞く"
                    className="bg-orange-500 text-white font-bold px-1 rounded mx-[1px] text-xs shadow-sm cursor-pointer hover:bg-orange-600 hover:scale-110 inline-block transition-all"
                  >
                    {text}
                  </span>
                );
              } else if (part.startsWith('<skipped>')) {
                const text = part.replace(/<\/?skipped>/g, '');
                return <span key={index} className="text-gray-400 line-through px-1 mx-[1px] text-xs">{text}</span>;
              } else {
                const text = part.replace(/\n/g, ' ');
                return <span key={index}>{text}</span>;
              }
            })}
          </div>
        );
      };

      const renderSelect = () => (
        <div className="fixed inset-0 bg-gradient-to-br from-blue-600 via-indigo-600 to-purple-800 flex justify-center items-center p-4">
          <div className="bg-white rounded-[2.5rem] shadow-2xl p-8 sm:p-10 max-w-md w-full text-center animate-fade-in relative overflow-hidden">
            <div className="absolute top-0 left-0 w-full h-32 bg-blue-50 rounded-b-[50%] -z-10"></div>
            
            <div className="mx-auto flex items-center justify-center mb-8 mt-2">
               <svg width="140" height="140" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" className="drop-shadow-lg">
                 <defs>
                   <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                     <stop offset="0%" stopColor="#3B82F6"/>
                     <stop offset="100%" stopColor="#8B5CF6"/>
                   </linearGradient>
                 </defs>
                 <circle cx="100" cy="100" r="85" fill="#EFF6FF" />
                 <circle cx="100" cy="100" r="65" fill="url(#grad1)" opacity="0.1" />
                 <path d="M100 45 A 25 25 0 0 0 75 70 V 105 A 25 25 0 0 0 125 105 V 70 A 25 25 0 0 0 100 45 Z" fill="url(#grad1)" />
                 <path d="M60 105 A 40 40 0 0 0 140 105" fill="none" stroke="#94A3B8" strokeWidth="8" strokeLinecap="round" />
                 <rect x="96" y="145" width="8" height="20" fill="#94A3B8" rx="4" />
                 <rect x="80" y="165" width="40" height="8" fill="#94A3B8" rx="4" />
                 <circle cx="35" cy="80" r="8" fill="#FBBF24" />
                 <circle cx="165" cy="70" r="6" fill="#F472B6" />
                 <circle cx="150" cy="130" r="10" fill="#34D399" />
                 <circle cx="45" cy="140" r="5" fill="#60A5FA" />
                 <path d="M50 60 Q 40 70 50 80" fill="none" stroke="#60A5FA" strokeWidth="4" strokeLinecap="round" />
                 <path d="M150 50 Q 165 65 150 80" fill="none" stroke="#F472B6" strokeWidth="4" strokeLinecap="round" />
               </svg>
            </div>
            
            <h1 className="text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600 mb-10 tracking-tight">音読検定 ver.2</h1>
            
            <button onClick={() => { setMode('submitFlow'); setStep('userInfo'); }} className="w-full flex flex-col items-center justify-center bg-gradient-to-r from-blue-500 to-indigo-500 text-white rounded-[1.5rem] p-5 mb-4 shadow-[0_8px_20px_rgba(59,130,246,0.3)] hover:shadow-[0_12px_25px_rgba(59,130,246,0.4)] active:scale-95 transition-all group">
              <IconMic className="w-8 h-8 mb-1 group-hover:scale-110 transition-transform" />
              <span className="text-xl font-bold tracking-wide">音読に挑戦する</span>
            </button>
            
            <button onClick={() => { setMode('checkFlow'); setCheckStatus('input'); setCheckInfo(prev => ({...prev, password: ''})); }} className="w-full flex items-center justify-center bg-gray-50 hover:bg-blue-50 text-gray-700 hover:text-blue-700 border-2 border-gray-100 hover:border-blue-200 rounded-[1.5rem] p-4 transition-all active:scale-95 group">
              <IconCheck className="w-5 h-5 mr-2 group-hover:scale-110 transition-transform" />

              </div>
              <div className="flex items-center gap-3 sm:gap-6">
                <div className={`text-2xl sm:text-4xl font-black italic transform -rotate-6 ${evalColor} drop-shadow-md`}>{evaluation}</div>
                <div className="text-right">
                  <span className="text-5xl sm:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-600">{data.total || 0}</span>
                  <span className="text-xl sm:text-3xl text-gray-400 font-bold"> / 10</span>
                </div>
              </div>
            </div>

            {data.highlighted_text && (
              <div className="bg-white p-4 sm:p-6 rounded-3xl border border-gray-200 mb-5 shadow-sm">
                <div className="flex justify-between items-center border-b pb-2 mb-3">
                  <h3 className="font-bold text-gray-700 flex items-center gap-2 text-sm"><IconMic className="w-5 h-5" /> 発音ハイライト</h3>
                  <span className="text-[10px] sm:text-xs text-blue-500 font-bold flex items-center gap-1 animate-pulse"><IconVolume className="w-3.5 h-3.5"/> 青やオレンジをタップで発音</span>
                </div>
                <div className="leading-loose text-left mb-4">
                  {renderHighlightedText(data.highlighted_text)}
                </div>
                <div className="flex flex-wrap gap-4 pt-3 border-t text-xs sm:text-sm justify-end text-gray-600 font-bold">
                  <span className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 bg-blue-600 rounded inline-block"></span> 難しいのに読めた！</span>
                  <span className="flex items-center gap-1.5"><span className="w-3.5 h-3.5 bg-orange-500 rounded inline-block"></span> 要練習</span>
                  <span className="flex items-center gap-1.5"><span className="text-gray-400 line-through">未読・スキップ</span></span>
                </div>
              </div>
            )}
            
            <div className="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-5">
              {[{ l: '発音', s: data.p_score, m: 4, f: data.p_fb }, { l: '抑揚', s: data.i_score, m: 3, f: data.i_fb }, { l: 'つながり', s: data.f_score, m: 3, f: data.f_fb }].map((item, idx) => (
                <div key={idx} className="bg-gray-50 p-4 rounded-2xl border border-gray-200 flex flex-col shadow-sm">
                  <div className="flex justify-between items-center mb-2 border-b border-gray-200 pb-2">
                    <span className="font-bold text-gray-700">{item.l}</span>
                    <span className="font-black text-blue-600 text-xl">{item.s} <span className="text-sm text-gray-400 font-normal">/{item.m}</span></span>
                  </div>
                  <div className="text-xs sm:text-sm text-gray-600 whitespace-pre-wrap flex-1 leading-relaxed">{item.f}</div>
                </div>
              ))}
            </div>
            
            <div className="bg-blue-50 p-4 sm:p-5 rounded-2xl mb-5 border border-blue-100 flex-1 shadow-sm">
              <h3 className="font-bold text-blue-800 mb-2 text-sm flex items-center gap-1.5"><IconCheck className="w-5 h-5" /> 先生からのコメント</h3>
              <p className="text-gray-700 text-sm sm:text-base leading-relaxed font-medium">{data.comment}</p>
            </div>
            
            <button onClick={() => setMode('select')} className="w-full py-4 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-2xl font-bold active:scale-95 transition-all text-base mt-auto">トップに戻る</button>
          </div>
        );
      };

      if (mode === 'select') return renderSelect();
      if (mode === 'submitFlow') {
        if (step === 'userInfo') return renderUserInfo();
        if (step === 'shuffling') return renderShuffling();
        if (step === 'preparing') return renderPreparing();
        if (step === 'recording') return renderRecording();
        if (step === 'submitting') return renderSubmitting();
        if (step === 'submitted') return renderSubmitted();
      }
      if (mode === 'checkFlow') {
        if (checkStatus === 'input') return renderCheckInput();
        return renderCheckResult();
      }
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
